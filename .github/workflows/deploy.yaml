name: Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ vars.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          VITE_REPO_OWNER: ${{ github.repository_owner }}
          VITE_REPO_ROCOCO: ${{ vars.REPO_ROCOCO }}
          VITE_REPO_BANK: ${{ vars.REPO_BANK }}
          VITE_REPO_AE: ${{ vars.REPO_ROCOCO }}
          VITE_REPO_AE_PY: ${{ vars.REPO_ROCOCO }}
          VITE_REPO_RESUME: ${{ github.event.repository.name }}

          VITE_SOCIAL_TELEGRAM: ${{ vars.SOCIAL_TELEGRAM }}
          VITE_SOCIAL_LINKEDIN: ${{ vars.SOCIAL_LINKEDIN }}
          VITE_SOCIAL_EMAIL: ${{ vars.SOCIAL_EMAIL }}

      - name: Upload production-ready build files
        uses: actions/upload-artifact@v7
        with:
          name: production-files
          path: ./dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: production-files
          path: ./dist

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
name: Deploy static content to Pages

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:

  deploy:

    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}


    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_REPO_OWNER: ${{ github.repository_owner }}
          VITE_REPO_ROCOCO: ${{ vars.REPO_ROCOCO }}
          VITE_REPO_BANK: ${{ vars.REPO_BANK }}
          VITE_REPO_AE: ${{ vars.REPO_ROCOCO }}
          VITE_REPO_AE_PY: ${{ vars.REPO_ROCOCO }}
          VITE_REPO_RESUME: ${{ github.event.repository.name }}

          VITE_SOCIAL_TELEGRAM: ${{ vars.SOCIAL_TELEGRAM }}
          VITE_SOCIAL_LINKEDIN: ${{ vars.SOCIAL_LINKEDIN }}
          VITE_SOCIAL_EMAIL: ${{ vars.SOCIAL_EMAIL }}

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          # Upload dist folder
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          token: '${{ github.token }}'

#      - name: Deploy to GitHub Pages
#        uses: peaceiris/actions-gh-pages@v4
#        with:
#          github_token: ${{ secrets.GITHUB_TOKEN }}
#          publish_dir: ./dist
name: Build portfolio
on:
  workflow_dispatch:


jobs:

  build_project:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ vars.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_REPO_OWNER: ${{ github.repository_owner }}
          VITE_REPO_ROCOCO: ${{ vars.REPO_ROCOCO }}
          VITE_REPO_BANK: ${{ vars.REPO_BANK }}
          VITE_REPO_AE: ${{ vars.REPO_ROCOCO }}
          VITE_REPO_AE_PY: ${{ vars.REPO_ROCOCO }}

          SOCIAL_TELEGRAM: ${{ vars.SOCIAL_TELEGRAM }}
          SOCIAL_LINKEDIN: ${{ vars.SOCIAL_LINKEDIN }}
          SOCIAL_EMAIL: ${{ vars.SOCIAL_EMAIL }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
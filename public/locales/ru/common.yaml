      short_description: |
        Микросервисная система для финансовых операций и получения курсов валют. 
        Стек: Java 21, Kafka, OpenFeign, PostgreSQL.
        Включает Gateway (REST/Kafka), Currency (интеграция с внешним API), Payment (создание сущностей) и модуль с автоматизированными Kafka-тестами.
      description: |
        **Банк** — это проект, представляющий собой сервис мультивалютных платежей, построенный на микросервисной
        архитектуре. Пользователи могут создавать банковские аккаунты, валютные кошельки, выполнять пополнения,
        переводы, списания и частичные/полные возвраты средств. Проект насыщен современными технологиями Java-стека и
        инструментами для автоматизации тестирования и CI/CD.
        
        ## 🛠️ **Архитектура и технологии**
        * **Backend**: Java 21, Gradle, Spring Boot (Hybernate, OpenFeign, Apache Kafka, Validation, OpenAPI)
        * **Инфраструктура**: Docker
        * **Базы данных**: PostgreSQL
        * **Тестирование**: Java 21, Gradle, JUnit 5, Kafka
        
        ## 🧩 **Сервисы**
        * **Currency** - сервис получения валют и хранения валют
        * **Payment** - банковские аккаунты, валютные кошельки, транзакции (возвраты)
        * **Gateway** - маршрутизация
        
        ## **Что реализовано в проекте?**
        * **Backend** - разработаны микросервисов с интеграцией как по REST так и по Kafka.  
        Помимо прочего, также реализованы:
          - i18n
          - валидация DTO
          - перехваты ошибок
          - OpenAPI
        * **Тестирование** - разработаны автотесты для проверки интеграции по Kafka сервиса платежей
        * **Окружение** - сборка backend, тестов в Docker
        * **CI/CD** - написан workflow для запуска тестов в GitHub Action при pull-request'ах с информативным
        сообщением о прохождении тестов в самом pull-request
        
        ## 🚀 **Запуск проекта**
        Реализован удобный запуск тестов в разных окружениях: `local`, `docker`
        
        ### Предусловия:
        1) Должны быть установлены локально Docker, Java 21  
        2) Установить обязательные переменные окружения  
        

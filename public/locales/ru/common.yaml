      description: |
        **AutomationExercise (Java)** — это фреймворк для автоматизации тестирования интернет-магазина
        [automationexercise.com](https://automationexercise.com) на Java. Проект покрывает UI и API функциональность:
        каталог, корзину, оформление заказа, регистрацию и др. Реализована гибкая конфигурация для разных окружений
        и интеграция с системой отслеживания ошибок (GitHub Issues)
        
        ## 🛠️ **Технологии и инструменты**
        * **Язык и сборка**: Java 21, Gradle
        * **Запуск тестов**: JUnit 5
        * **Тестирование**: Rest Assured, Playwright
        * **Отчеты**: Allure
        * **Инфраструктура**: Docker, Playwright (встроенные браузеры)
        * **Интеграция**: GitHub API (для работы с Issues)
        
        ## 💻 **Что реализовано в проекте?**
        * **UI и API тесты** — покрытие основных пользовательских сценариев
        * **Screenshot тесты** — визуальное сравнение страниц для обнаружения регрессий
        (с поддержкой браузеров Chromium, Firefox, WebKit)
        * **Гибкая конфигурация** — переключение между окружениями `local`, `docker`, `ci` через переменные окружения
        * **Интеграция с GitHub Issues** — автоматическое отключение тестов (@DisabledByIssue), если соответствующий
        баг ещё открыт
        * **Отчеты Allure** — детальная информация о прохождении тестов с приложенными скриншотами и видео
        
        ## 🚀 **Запуск проекта**
        ### Предусловия:
        1) Установите Java 21 и Docker (для запуска в контейнерах)
        2) Создайте копии папки со скриншотами: `src/.screen-output/screenshots/remote` → `local` и `docker` (для корректной
        работы `screenshot` тестов)
        3) При первом запуске установите переменную `TEST_REWRITE_ALL_SCREENSHOTS=true` для создания эталонных скриншотов
        4) Сгенерируйте PAT токен в GitHub (с правами на чтение issue) и установите переменные окружения
        `GITHUB_TOKEN`, `GITHUB_TOKEN_NAME`, `GITHUB_ACCOUNT_NAME`, `GITHUB_REPO_NAME`
        
        ### **Способы запуска:**
        1) Локально: [Ссылка на детальную информацию](https://github.com/arrnel/automation-exercise/blob/master/README.md#%D0%B7%D0%B0%D0%BF%D1%83%D1%81%D0%BA-%D1%82%D0%B5%D1%81%D1%82%D0%BE%D0%B2-%D0%B2-ide)
        2) В Docker: [Ссылка на детальную информацию](https://github.com/arrnel/automation-exercise/blob/master/README.md#%D0%B7%D0%B0%D0%BF%D1%83%D1%81%D0%BA-%D1%82%D0%B5%D1%81%D1%82%D0%BE%D0%B2-%D0%B2-docker)
        3) В CI (GitHub Actions):  
          a) сделайте fork репозитория (если ещё не сделал)  
          b) в настройках репозитория укажи необходимые секреты и переменные окружения (`Settings` -> `Secrets and variables` -> `Actions`)  
          c) в навигации перейди в раздел `Actions` и выбери нужный action. Например, `Nightly run`  
          d) Запусти workflow  
        
        ## 👉**Подробнее**
        Подробная информация доступна в [оригинальном README](https://github.com/arrnel/automation-exercise)
